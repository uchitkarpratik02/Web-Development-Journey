<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASS TIME TABLE</title>
</head>
<body>
    <table border="black">
        <thead>
            <tr>
                <th colspan="3">CLASS TIME TABLE</th>
            </tr>
            <tr>
                <th>Day</th>
                <th>Time</th>
                <th>Subject</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">Mon</td>
                <td>9-10 AM</td>
                <td>Math</td>
            </tr>
            <tr>
                <td>10-11 AM</td>
                <td>Science</td>
            </tr>
            <tr>
                <td>Tue</td>
                <td>9-10 AM</td>
                <td>English</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
