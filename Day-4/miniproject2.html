<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <div>
            <label for="sm">Full Name:</label>
            <input type="text" id="sm" placeholder="Enter Your Name">
        </div>
        <br>
        <div>
            <label for="ed">Email:</label>
            <input type="email" id="ed" placeholder="Enter Your Email">
        </div>
        <br>
        <div>
            <label for="mn">Mobile Number:</label>
            <input type="number" id="mn" placeholder="Enter Your Mobile No.">
        </div>
        <br>
        <div>
            <label for="branch"> Position Applying For: </label>
            <select name="branch" id="branch">
                <option>Select Your Position</option>  
                <option value="fd">Frontend Developer</option>      
                <option value="bd">Backend Developer</option>
                <option value="fl">FullStack Developer</option>
            </select>
        </div>
        <br>
        <div>
            <label>Experienve Level: </label>
            Fresher <input name="level" type="range" min="0" max="100">Experinced
        </div>
        <br>
        <div>
            <label>Skills: </label>
            <input type="checkbox" name="ms" id="html">
            <label for="ms">Mern Stack</label>
            <input type="checkbox" name="mv" id="css">
            <label for="mv">MVEN Stack</label>
            <input type="checkbox" name="kf" id="javas">
            <label for="kf">Kafka</label>
            <input type="checkbox" name="pr" id="pr">
            <label for="pr">Prisma</label>
            <input type="checkbox" name="sk" id="angular">
            <label for="angular">Angular</label>
        </div>
        <br>
        <div>
            <label>Why Should We Hire You?</label>
            <textarea type="text" placeholder="write something"></textarea>
        </div>
        <br>
        <div>
            <button type="Submit">Submit</button>
        </div>
        
        

    </form>
    
</body>
</html>
