<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>
    <form>
        <div>
            <label for="sm">Full Name:</label>
            <input type="text" id="sm" placeholder="Enter Your Name">
        </div>
        <br>
        <div>
            <label for="ed">Email:</label>
            <input type="email" id="ed" placeholder="Enter Your Email">
        </div>
        <br>
        <div>
            <label for="mn">Mobile Number:</label>
            <input type="number" id="mn" placeholder="Enter Your Mobile No.">
        </div>
        <br>
        <div>
            <label>Gender: </label>
            <input type="radio" name="sx" id="male" value="male">
            <label for="male">male</label>
            <input type="radio" name="sx" id="female" value="female">
            <label for="female">female</label>
        </div>
        <br>
        <div>
            <label for="branch"> Branch: </label>
            <select name="branch" id="branch">
                <option>Select Your Branch</option>  
                <option value="Nag">CSE</option>      
                <option value="Mum">DS</option>
                <option value="Pun">AI&ML</option>
                <option value="Del">IT</option>
        </select>
        </div>
        <br>
        <div>
            <label>Skills: </label>
            <input type="checkbox" name="sk" id="html">
            <label for="html">HTML</label>
            <input type="checkbox" name="sk" id="css">
            <label for="css">CSS</label>
            <input type="checkbox" name="sk" id="javas">
            <label for="javas">JavaScript</label>
            <input type="checkbox" name="sk" id="java">
            <label for="java">Java</label>
            <input type="checkbox" name="sk" id="python">
            <label for="python">Python</label>
        </div>
        <br>
        <div>
        <label for="add">Address</label>
        <input type="text" id="add" placeholder="Fill Your Address">
        </div>
        <br>
        <button>Submit</button>
    </form>
</body>
</html>
