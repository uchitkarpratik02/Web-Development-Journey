<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Student Registration Form</title>
</head>
<body>
    <div class="container">
    <form>
        <div class="row">
            <div class="col-md-6">
                <label class="form-label fw-bold" for="name">Name</label>
                <input class="form-control" type="text" id="name" placeholder="Enter Your Name" >
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold" for="email">Email</label>
                <input class="form-control" type="email" id="email" placeholder="Enter Your Email" >
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold" for="city">City</label>
                <input class="form-control" type="text" id="city" placeholder="Enter Your City" >
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold" for="password">Password</label>
                <input class="form-control" type="Password" id="Password" placeholder="Enter Your password" >
            </div>
            <div class="col-md-6">
                <label for="inputState" class="form-label fw-bold">Course</label>
                <select id="inputstate" class="form-select" >
                <option selected>Select Your Course</option>
                <option value="b.tech">B.Tech</option>
                <option value="b.e">B.E</option>
                <option value="m.tech">M.Tech</option>            
                <option value="phd">PHD</option>
                </select>
            </div>
            <div class="col-md-6 d-flex flex-column justify-content-end mb-3">
                    <label class="form-label fw-bold">Gender</label>
                    <div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" name="gender" type="radio" id="male" value="male">
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" name="gender" type="radio" id="female" value="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                    </div>
                </div>
                
                       
            </div>
            <button class="btn btn-primary">Submit</button>

        </div>        
    </form>
    </div>
</body>
</html>
