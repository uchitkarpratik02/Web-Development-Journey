<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Live Text Counter</h2>
        <textarea id="textInput" placeholder="Start typing here..." maxlength="200"></textarea>
        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Characters</span>
                <span id="charCount" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Words</span>
                <span id="wordCount" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Remaining</span>
                <span id="remainingCount" class="stat-value">200</span>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
