<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">
    <div class="container">
        <h1>Theme Switcher</h1>
        <p>Select a color theme to change the look of this page instantly.</p>
        
        <div class="button-group">
            <button id="light" class="btn">Light Mode</button>
            <button id="dark" class="btn">Dark Mode</button>
            <button id="blue" class="btn">Blue Theme</button>
            <button id="green" class="btn">Green Theme</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
