<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>Event Practice Hub</h1>

        <div class="section">
            <h3>1. Click & Keyboard Events</h3>
            <button id="clickBtn">Click Me</button>
            <input type="text" id="keyInput" placeholder="Press keys here...">
            <div id="actionLog">Logs will appear here...</div>
        </div>

        <div class="section">
            <h3>2. Input & Change Events</h3>
            <div class="row">
                <div class="field">
                    <label for="liveInput">Live Sync:</label>
                    <input type="text" id="liveInput" placeholder="Type to sync...">
                    <p id="liveOutput">Sync output: </p>
                </div>
                <div class="field">
                    <label for="themeSelect">Theme Dropdown:</label>
                    <select id="themeSelect">
                        <option value="light">Light Mode</option>
                        <option value="dark">Dark Mode</option>
                        <option value="blue">Blue Mode</option>
                    </select>
                </div>
            </div>
            <div class="field checkbox-field">
                <label>
                    <input type="checkbox" id="toggleCheckbox"> Enable Extra Settings
                </label>
                <p id="checkboxStatus">Status: Disabled</p>
            </div>
        </div>

        <div class="section">
            <h3>3. Form Submit Event</h3>
            <form id="practiceForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="useremail">Email</label>
                    <input type="email" id="useremail" required>
                </div>
                <button type="submit">Submit Form</button>
            </form>
            <div id="formOutput" class="hidden"></div>
        </div>
    </div>
    <script src="combined-practice.js"></script>    
</body>
</html>
